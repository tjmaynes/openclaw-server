---
- name: Download Tailscale GPG key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"

- name: Add Tailscale apt source
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/tailscale.list
    content: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main\n"
    mode: "0644"

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check Tailscale status
  ansible.builtin.command: tailscale status --json
  register: tailscale_status
  changed_when: false

- name: Join tailnet
  ansible.builtin.command: tailscale up --authkey={{ tailscale_authkey }}
  when: (tailscale_status.stdout | from_json).BackendState != "Running"
  changed_when: true
  no_log: true

- name: Lock down Tailscale binary
  ansible.builtin.file:
    path: /usr/bin/tailscale
    owner: root
    group: root
    mode: "0750"

- name: Lock down Tailscale socket
  ansible.builtin.file:
    path: /var/run/tailscale/tailscaled.sock
    owner: root
    group: root
    mode: "0700"

- name: Allow Tailscale UDP port
  ansible.builtin.command: ufw allow 41641/udp
  changed_when: false

- name: Allow OpenClaw gateway from Tailscale subnet
  ansible.builtin.command: ufw allow from 100.64.0.0/10 to any port {{ gateway_port }}
  changed_when: false
