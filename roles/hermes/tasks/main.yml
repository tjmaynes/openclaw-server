---
- name: Set service user
  ansible.builtin.set_fact:
    hermes_user: "{{ hermes_user }}"

- name: Configure scoped sudoers for service user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ hermes_user }}"
    content: |
      {{ hermes_user }} ALL=(ALL) NOPASSWD: \
        /usr/bin/systemctl start hermes-gateway.service, \
        /usr/bin/systemctl stop hermes-gateway.service, \
        /usr/bin/systemctl restart hermes-gateway.service, \
        /usr/bin/systemctl status hermes-gateway.service, \
        /usr/bin/systemctl enable hermes-gateway.service, \
        /usr/bin/systemctl disable hermes-gateway.service
      {{ hermes_user }} ALL=(ALL) NOPASSWD: \
        /usr/bin/journalctl -u hermes-gateway.service
    mode: "0440"
    validate: "visudo -cf %s"

- name: Check if hermes binary exists
  ansible.builtin.stat:
    path: /home/{{ hermes_user }}/.local/bin/hermes
  register: hermes_binary

- name: Install hermes dependencies
  ansible.builtin.apt:
    name:
      - ripgrep
      - ffmpeg
      - build-essential
      - python3-dev
      - libffi-dev
    state: present

- name: Download hermes-agent installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh
    dest: /tmp/hermes-install.sh
    mode: "0755"
  when: not hermes_binary.stat.exists

- name: Install hermes-agent via official installer # noqa: no-changed-when
  ansible.builtin.shell:
    cmd: bash /tmp/hermes-install.sh < /dev/null
  become: true
  become_user: "{{ hermes_user }}"
  environment:
    HOME: /home/{{ hermes_user }}
    PATH: "/home/{{ hermes_user }}/.local/bin:/usr/local/bin:/usr/bin:/bin"
  when: not hermes_binary.stat.exists
  failed_when: false

- name: Check if Playwright browsers are installed
  ansible.builtin.find:
    paths: /home/{{ hermes_user }}/.cache/ms-playwright/
    file_type: directory
  register: hermes_playwright_browsers

- name: Install Playwright system dependencies # noqa: no-changed-when
  ansible.builtin.command:
    cmd: npx playwright install --with-deps
  environment:
    HOME: /home/{{ hermes_user }}
    PATH: "/home/{{ hermes_user }}/.local/bin:/usr/local/bin:/usr/bin:/bin"
  when: hermes_playwright_browsers.matched == 0
  failed_when: false

- name: Verify hermes binary exists
  ansible.builtin.command:
    cmd: /home/{{ hermes_user }}/.local/bin/hermes --version
  become: true
  become_user: "{{ hermes_user }}"
  environment:
    HOME: /home/{{ hermes_user }}
    PATH: "/home/{{ hermes_user }}/.local/bin:/usr/local/bin:/usr/bin:/bin"
  changed_when: false

- name: Clean up hermes installer
  ansible.builtin.file:
    path: /tmp/hermes-install.sh
    state: absent
  when: not hermes_binary.stat.exists

- name: Get service user UID
  ansible.builtin.command:
    cmd: id -u {{ hermes_user }}
  register: hermes_user_uid
  changed_when: false

- name: Enable lingering for service user # noqa: command-instead-of-module
  ansible.builtin.command: loginctl enable-linger {{ hermes_user }}
  changed_when: false

- name: Ensure XDG_RUNTIME_DIR exists for service user
  ansible.builtin.file:
    path: /run/user/{{ hermes_user_uid.stdout }}
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0700"

- name: Create tmpfiles rule for service user runtime dir
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/{{ hermes_user }}-runtime.conf
    content: |
      d /run/user/{{ hermes_user_uid.stdout }} 0700 {{ hermes_user }} {{ hermes_user }} -
    mode: "0644"

- name: Enable user manager at boot for service user
  ansible.builtin.systemd:
    name: "user@{{ hermes_user_uid.stdout }}"
    enabled: true
    state: started

- name: Set XDG_RUNTIME_DIR in service user bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ hermes_user }}/.bashrc
    line: 'export XDG_RUNTIME_DIR=/run/user/$(id -u)'
    create: true
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0644"
  become: true
  become_user: "{{ hermes_user }}"

- name: Set DBUS_SESSION_BUS_ADDRESS in service user bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ hermes_user }}/.bashrc
    line: 'export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus'
  become: true
  become_user: "{{ hermes_user }}"

- name: Set DOCKER_HOST in service user bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ hermes_user }}/.bashrc
    line: 'export DOCKER_HOST=unix:///run/user/$(id -u)/docker.sock'
  become: true
  become_user: "{{ hermes_user }}"

- name: Activate mise in service user bashrc
  ansible.builtin.lineinfile:
    path: /home/{{ hermes_user }}/.bashrc
    line: 'eval "$(mise activate bash)"'
  become: true
  become_user: "{{ hermes_user }}"

- name: Add hermes-logs function to service user bashrc
  ansible.builtin.blockinfile:
    path: /home/{{ hermes_user }}/.bashrc
    marker: "# {mark} ANSIBLE MANAGED - hermes-logs"
    block: |
      hermes-logs() {
        journalctl --user -u hermes-gateway -f
      }
  become: true
  become_user: "{{ hermes_user }}"

- name: Ensure .hermes config directory exists
  ansible.builtin.file:
    path: /home/{{ hermes_user }}/.hermes
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0700"
  become: true
  become_user: "{{ hermes_user }}"

- name: Create hermes directory structure
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "{{ item.mode }}"
  become: true
  become_user: "{{ hermes_user }}"
  loop:
    - { path: "/home/{{ hermes_user }}/.hermes/logs", mode: "0755" }
    - { path: "/home/{{ hermes_user }}/.hermes/data", mode: "0755" }

- name: Write hermes environment file
  ansible.builtin.copy:
    dest: /home/{{ hermes_user }}/.hermes/.env
    content: |
      {% if discord_bot_token is defined %}
      DISCORD_BOT_TOKEN={{ discord_bot_token }}
      {% if discord_allowed_users is defined %}
      DISCORD_ALLOWED_USERS={{ discord_allowed_users }}
      {% endif %}
      {% if discord_home_channel is defined %}
      DISCORD_HOME_CHANNEL={{ discord_home_channel }}
      {% endif %}
      {% endif %}
      FIRECRAWL_API_KEY={{ firecrawl_api_key }}
      FIRECRAWL_BASE_URL={{ firecrawl_base_url }}
      HONCHO_BASE_URL={{ honcho_base_url }}
      HONCHO_API_KEY={{ honcho_api_key }}
      TIMEZONE={{ timezone }}
      HERMES_MODEL={{ hermes_model }}
      HERMES_INFERENCE_PROVIDER={{ hermes_inference_provider }}
      {% if github_token is defined %}
      GITHUB_TOKEN={{ github_token }}
      GH_TOKEN={{ github_token }}
      {% endif %}
      {% if home_assistant_url is defined and home_assistant_token is defined %}
      HASS_URL={{ home_assistant_url }}
      HASS_TOKEN={{ home_assistant_token }}
      {% endif %}
      {% if mattermost_url is defined and mattermost_token is defined %}
      MATTERMOST_URL={{ mattermost_url }}
      MATTERMOST_TOKEN={{ mattermost_token }}
      {% if mattermost_allowed_users is defined %}
      MATTERMOST_ALLOWED_USERS={{ mattermost_allowed_users }}
      {% endif %}
      {% endif %}
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0600"
  become: true
  become_user: "{{ hermes_user }}"
  no_log: true
  notify:
    - Restart hermes gateway

- name: Install hermes gateway systemd service
  ansible.builtin.command:
    cmd: /home/{{ hermes_user }}/.local/bin/hermes gateway install
  become: true
  become_user: "{{ hermes_user }}"
  environment:
    HOME: /home/{{ hermes_user }}
    XDG_RUNTIME_DIR: "/run/user/{{ hermes_user_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ hermes_user_uid.stdout }}/bus"
  changed_when: false

- name: Ensure .ssh directory exists for service user
  ansible.builtin.file:
    path: /home/{{ hermes_user }}/.ssh
    state: directory
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0700"
  become: true
  become_user: "{{ hermes_user }}"

- name: Generate SSH key for service user
  community.crypto.openssh_keypair:
    path: /home/{{ hermes_user }}/.ssh/id_ed25519
    type: ed25519
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0600"
  become: true
  become_user: "{{ hermes_user }}"
  register: hermes_ssh_key

- name: Display public SSH key # noqa: no-handler
  ansible.builtin.debug:
    msg: "Add this key to GitHub: {{ hermes_ssh_key.public_key }}"
  when: hermes_ssh_key.changed

- name: Configure SSH for GitHub
  ansible.builtin.copy:
    dest: /home/{{ hermes_user }}/.ssh/config
    owner: "{{ hermes_user }}"
    group: "{{ hermes_user }}"
    mode: "0600"
    content: |
      Host github.com
        IdentityFile ~/.ssh/id_ed25519
        IdentitiesOnly yes
  become: true
  become_user: "{{ hermes_user }}"
