---
- name: Add mise GPG key
  ansible.builtin.get_url:
    url: https://mise.jdx.dev/gpg-key.pub
    dest: /etc/apt/keyrings/mise-archive-keyring.pub
    mode: "0644"

- name: Add mise apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/mise.list
    content: "deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.pub arch={{ ansible_architecture | regex_replace('aarch64', 'arm64') | regex_replace('x86_64', 'amd64') }}] https://mise.jdx.dev/deb stable main\n"
    mode: "0644"

- name: Install mise
  ansible.builtin.apt:
    name: mise
    state: present
    update_cache: true

- name: Create mise config directory
  ansible.builtin.file:
    path: /home/openclaw/.config/mise
    state: directory
    owner: openclaw
    group: openclaw
    mode: "0755"

- name: Write mise config
  ansible.builtin.copy:
    dest: /home/openclaw/.config/mise/config.toml
    content: |
      [tools]
      node = "{{ mise_node_version }}"
      python = "{{ mise_python_version }}"
      go = "{{ mise_go_version }}"
      direnv = "{{ mise_direnv_version }}"
      just = "{{ mise_just_version }}"
    owner: openclaw
    group: openclaw
    mode: "0644"
  register: mise_config

- name: Install mise runtimes
  ansible.builtin.command: mise install --yes
  become: true
  become_user: openclaw
  environment:
    HOME: /home/openclaw
    MISE_YES: "1"
  changed_when: mise_config.changed
